name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.releases_created == 'true' }}

      - uses: pnpm/action-setup@v4
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          run_install: false

      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Verify package artifacts
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: pnpm test:package

      - name: Prepare release artifacts
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: mkdir .release-artifacts

      - name: Publish @comp0/core
        if: ${{ steps.release.outputs['packages/core--release_created'] == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm --filter @comp0/core pack --pack-destination .release-artifacts
          npm publish .release-artifacts/comp0-core-${{ steps.release.outputs['packages/core--version'] }}.tgz --access public --provenance

      - name: Publish @comp0/react
        if: ${{ steps.release.outputs['packages/react--release_created'] == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm --filter @comp0/react pack --pack-destination .release-artifacts
          npm publish .release-artifacts/comp0-react-${{ steps.release.outputs['packages/react--version'] }}.tgz --access public --provenance

      - name: Publish comp0
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm pack --pack-destination .release-artifacts
          npm publish .release-artifacts/comp0-${{ steps.release.outputs.version }}.tgz --access public --provenance
